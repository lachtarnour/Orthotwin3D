run:
  name: teethseg22_dgcnn_groupnorm
  seed: 42

model:
  input_channels: 6
  num_classes: 17
  k: 20
  emb_dims: 1024
  dropout: 0.5

sampling:
  source_points: 60000
  num_points: 15000
  eval_views: 2

augmentation:
  rotation_degrees: [5.0, 5.0, 10.0]
  scale_range: [0.95, 1.05]
  translation_range: 0.01
  jitter_std: 0.001
  jitter_clip: 0.003

training:
  epochs: 100
  lr: 0.001
  weight_decay: 0.0001
  grad_clip: 1.0
  amp: true
  validation_every_epochs: 1
  log_every_epochs: 1
  evaluate_epoch_zero: true
  monitor: val_miou
  monitor_mode: max

scheduler:
  name: reduce_on_plateau
  factor: 0.8
  patience: 2
  threshold: 0.001
  threshold_mode: abs
  min_lr: 0.00005

performance:
  tf32: true
  float32_matmul_precision: high

loss:
  cross_entropy_weight: 1.0
  dice_weight: 1.0
  binary_weight: 0.5
  max_cross_entropy: 6.0
  max_binary: 6.0

logging:
  wandb: true
  project: OrthoTwin3D

checkpoint:
  save_every_epochs: 10

early_stopping:
  patience: 7
  min_delta: 0.001
